name: 🚀 Deploy Development

on:
  push:
    branches:
      - dev

concurrency:
  group: development-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest

    steps:
      - name: Execute deployment via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            PHP=/opt/alt/php83/usr/bin/php
            APP_DIR=/home/technomasrsystem/online-store.technomasrsystems.com

            echo "========== START DEPLOY =========="
            cd "$APP_DIR"

            echo "Current Branch:"
            git branch --show-current

            echo "Removing conflicting local CSS files..."
            rm -f public/css/app/custom-stylesheet.css
            rm -f public/css/app/whatsapp-ui.css
            rm -f public/css/app/messaging-health-dashboard.css
            rm -f public/css/app/meta-integrations-reset.css

            # حماية public/.htaccess (غير متتبَّع) أثناء git pull
            HTACCESS_BACKUP="${APP_DIR}/storage/app/.htaccess.deploy-backup"
            mkdir -p "${APP_DIR}/storage/app"
            if [ -f public/.htaccess ]; then
              cp -f public/.htaccess "${HTACCESS_BACKUP}"
            fi

            echo "Pulling latest changes..."
            git pull --ff-only origin main || git pull origin main

            if [ -f "${HTACCESS_BACKUP}" ]; then
              cp -f "${HTACCESS_BACKUP}" public/.htaccess
            fi

            if [ ! -f public/.htaccess ]; then
              cat > public/.htaccess <<'HTACCESS_EOF'
<IfModule mod_rewrite.c>
    <IfModule mod_negotiation.c>
        Options -MultiViews -Indexes
    </IfModule>

    RewriteEngine On
    RewriteCond %{HTTP:Authorization} .
    RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]
    RewriteCond %{HTTP:x-xsrf-token} .
    RewriteRule .* - [E=HTTP_X_XSRF_TOKEN:%{HTTP:X-XSRF-Token}]
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} (.+)/$
    RewriteRule ^ %1 [L,R=301]
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteRule ^ index.php [L]
</IfModule>
HTACCESS_EOF
            fi

            chmod 644 public/.htaccess

            echo "Installing Composer packages..."
            $PHP /usr/local/bin/composer install \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader \
              --no-dev

            echo "Running central migrations..."
            $PHP artisan migrate --force

            echo "Running tenant migrations and syncing permissions..."
            $PHP artisan tenants:sync-permissions --migrate --no-interaction

            if command -v npm >/dev/null 2>&1; then
              echo "Building frontend assets..."
              npm ci --ignore-scripts
              npm run build
            else
              echo "npm not found — skipping frontend build"
            fi

            echo "Publishing Filament assets..."
            $PHP artisan filament:assets

            echo "Clearing cache..."
            $PHP artisan optimize:clear

            echo "Optimizing..."
            $PHP artisan optimize

            echo "Restarting queue workers..."
            $PHP artisan queue:restart

            echo "========== DEPLOY COMPLETED =========="
