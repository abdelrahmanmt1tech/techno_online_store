name: 🚀 Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Execute deployment via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            echo "========== START DEPLOY =========="

            cd /home/technomasrsystem/online-store.technomasrsystems.com

            echo "Current Branch:"
            git branch --show-current

            echo "Pulling latest changes..."
            git pull origin main

            echo "Installing Composer packages..."
            /opt/alt/php83/usr/bin/php /usr/local/bin/composer install \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader

            echo "Running migrations..."
            /opt/alt/php83/usr/bin/php artisan migrate --force

            echo "Running seeders..."
            /opt/alt/php83/usr/bin/php artisan db:seed --force

            echo "Publishing Filament assets..."
            /opt/alt/php83/usr/bin/php artisan filament:assets

            echo "Clearing cache..."
            /opt/alt/php83/usr/bin/php artisan optimize:clear

            echo "Optimizing..."
            /opt/alt/php83/usr/bin/php artisan optimize

            echo "========== DEPLOY COMPLETED =========="
